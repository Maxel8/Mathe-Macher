<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathe-Macher</title>
    <meta name="theme-color" content="#ff0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.png" type="image/png" />

    <style>
      body {
        background-color: #fff8e7;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      p {
        font-size: 2.5em;
        margin: 10px 0;
      }

      button {
        background-color: #ff4c4c;
        color: white;
        font-size: 2em;
        padding: 15px 30px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-bottom: 20px;
      }

      button:hover {
        background-color: #e60000;
      }
    </style>
  </head>

  <body>
    <p><b>Mathe-Macher</b></p>
    <button id="grundrechnen">Grundrechenarten</button>
    <button id="fläche_rechnen">Flächeninhalt: Berechnung</button>
    <button disabled id="fläche_umwandeln">
      Flächeninhalt: Einheiten umrechnen
    </button>
    <button id="info" style="background-color: black; font-size: 1em">
      Mathe-Macher
    </button>
    <br />
    <p>Streak: <span id="streak"></span></p>
    <p>höchste Streak: <span id="max-streak"></span></p>

    <script>
      let streak = Number(localStorage.getItem("streak")) || 0;
      let maxStreak = Number(localStorage.getItem("maxStreak")) || 0;

      document.getElementById("streak").textContent = streak;
      document.getElementById("max-streak").textContent = maxStreak;
      const grundrechnenBtn = document.getElementById("grundrechnen");
      const flächeRechnenBtn = document.getElementById("fläche_rechnen");
      const flächeUmwandelnBtn = document.getElementById("fläche_umwandeln");
      const infoBtn = document.getElementById("info");

      grundrechnenBtn.addEventListener("click", () => {
        window.location.href = "grundrechnen.html";
      });
      flächeRechnenBtn.addEventListener("click", () => {
        window.location.href = "fläche_rechnen.html";
      });
      flächeUmwandelnBtn.addEventListener("click", () => {
        window.location.href = "fläche_umwandeln.html";
      });
      infoBtn.addEventListener("click", () => {
        alert("Mathe-Macher \n v1.0.0 \n von Maximilian (Maxel8)");
      });
    </script>
  </body>
</html>
