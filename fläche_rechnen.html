<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathe-Macher</title>
    <meta name="theme-color" content="#ff0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="icon" href="icon.png" type="image/png" />

    <style>
      body {
        background-color: #fff8e7;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      p {
        font-size: 2em;
        margin: 10px 0;
      }

      #aufgabe-container {
        display: flex;
        flex-wrap: wrap;
        width: 90%;
        max-width: 800px;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
      }

      #aufgabe-container span,
      #ergebnis_user {
        font-size: 3em;
        margin: 0 10px;
      }

      #gleichzeichen {
        flex-shrink: 0;
      }

      sup {
        font-size: 0.6em;
        position: relative;
        top: -1.2em;
        margin-left: 2px;
      }

      input[type="number"] {
        width: 200px;
        padding: 10px;
        font-size: 3em;
        text-align: center;
        border-radius: 10px;
        border: 2px solid #ccc;
      }

      button {
        background-color: #ff4c4c;
        color: white;
        font-size: 2em;
        padding: 15px 30px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-bottom: 20px;
      }

      button:hover {
        background-color: #e60000;
      }

      #streak,
      #max-streak {
        font-size: 2em;
      }

      .progress-container {
        width: 100%;
        max-width: 400px;
        background-color: #e0e0e0;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
        height: 30px;
        margin: 20px 0;
      }

      .progress-bar {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #4caf50, #81c784);
        border-radius: 25px 0 0 25px;
        text-align: center;
        line-height: 30px;
        color: white;
        font-weight: bold;
        transition: width 0.4s ease-in-out;
      }
      #aufgabe-container {
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <img
      src="rechteck.png"
      alt="Rechteck"
      style="width: 400px; max-width: 80%; margin-bottom: 20px"
    />
    <div id="aufgabe-container">
      <span id="a"></span>

      <span id="b"></span>

      <input type="number" inputmode="numeric" id="ergebnis_user" />
    </div>

    <button onclick="check()">Prüfen</button>
    <p>Streak: <span id="streak"></span></p>
    <p>höchste Streak: <span id="max-streak"></span></p>
    <br />

    <div>
      <button
        style="background-color: black; font-size: 1em"
        onclick="goBack()"
      >
        Zurück
      </button>
    </div>

    <script>
      let streak = Number(localStorage.getItem("streak")) || 0;
      let maxStreak = Number(localStorage.getItem("maxStreak")) || 0;
      let a = 0;
      let b = 0;

      document.getElementById("streak").textContent = streak;
      document.getElementById("max-streak").textContent = maxStreak;

      function goBack() {
        const answer = confirm("Willst du wirklich zurück zum Hauptmenü?");
        if (answer) {
          window.location.href = "index.html";
        }
      }

      function updateProgress() {
        const bar = document.getElementById("progressBar");

        const current = streak;
        const max = Math.max(maxStreak, 1);

        let percent = (current / max) * 100;

        bar.style.width = percent + "%";
        bar.textContent = current > 0 ? Math.round(percent) + "%" : "";
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function init() {
        a = randomInt(1, 20);
        b = randomInt(1, 15);

        document.getElementById("a").textContent = "a=" + a;
        document.getElementById("b").textContent = "b=" + b;
        document.getElementById("ergebnis_user").value = "";
        updateProgress();
      }

      init();

      function check() {
        let ergebnis_user = Number(
          document.getElementById("ergebnis_user").value,
        );
        let ergebnis = a * b;

        if (ergebnis_user === ergebnis) {
          streak += 1;
        } else {
          streak = 0;
          alert("Falsch! Das Ergebnis ist: " + ergebnis);
        }

        localStorage.setItem("streak", streak);

        if (streak > maxStreak) {
          maxStreak = streak;
          localStorage.setItem("maxStreak", maxStreak);
        }

        document.getElementById("streak").textContent = streak;
        document.getElementById("max-streak").textContent = maxStreak;

        current = streak;
        max = Math.max(maxStreak, 1);
        updateProgress();

        init();
      }
    </script>
  </body>
</html>
