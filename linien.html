<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe-Macher</title>
<meta name="theme-color" content="#ff0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">

<style>
body {
    background-color: #fff8e7;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

p {
    font-size: 2em;
    margin: 10px 0;
}

#aufgabe-container {
    display: flex;
    flex-wrap: wrap;
    width: 90%;
    max-width: 800px;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
}

#aufgabe-container span, #ergebnis_user {
    font-size: 3em;
    margin: 0 10px;
}

#gleichzeichen {
    flex-shrink: 0;
}

sup {
    font-size: 0.6em;
    position: relative;
    top: -1.2em;
    margin-left: 2px;
}

input[type="number"] {
    width: 200px;
    padding: 10px;
    font-size: 3em;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #ccc;
}

button {
    background-color: #ff4c4c;
    color: white;
    font-size: 2em;
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background-color 0.3s;
    margin-bottom: 20px;
}

button:hover {
    background-color: #e60000;
}

.sites {
    background-color: #000000;
    color: white;
    font-size: 1em;
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background-color 0.3s;
}

.sites:hover {
    background-color: #2a2a2a;
}

.button-container {
    display: flex;
    gap: 10px; /* Abstand zwischen Buttons */
}

#streak, #max-streak {
    font-size: 2em;
}

.progress-container {
  width: 100%;
  max-width: 400px;
  background-color: #e0e0e0;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
  height: 30px;
  margin: 20px 0;
}

.progress-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, #4caf50, #81c784);
  border-radius: 25px 0 0 25px;
  text-align: center;
  line-height: 30px;
  color: white;
  font-weight: bold;
  transition: width 0.4s ease-in-out;
}
</style>
</head>
<body>

<div class="button-container">
<a href="index.html"><button class="sites">Grundrechenarten</button></a>
<button class="sites" style="background-color: #4caf50;">◯</button>

</div>
